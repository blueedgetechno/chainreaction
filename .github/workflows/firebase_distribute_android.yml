name: Build & Distribute to Firebase

on:
  workflow_dispatch:
  push:
    branches: [main, "feat/*"]

# 1. You MUST grant the workflow permission to use GitHub Models
permissions:
  contents: read
  models: read

jobs:
  build:
    name: ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 4

      - name: Make build script executable
        run: |
          chmod +x .github/scripts/build-android.sh
          chmod +x .github/scripts/package-app-android.sh
          chmod +x .github/scripts/upload-firebase-android.sh

      - name: 🧪 Test if secrets are set
        run: |
          if [ -z "${{ secrets.ANDROID_APP_ID }}" ]; then
            echo "Error: ANDROID_APP_ID is not set."
            exit 1
          fi
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "Error: FIREBASE_TOKEN is not set."
            exit 1
          fi
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Error: KEYSTORE_BASE64 is not set."
            exit 1
          fi

      - name: 🔑 Decode Release Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: 📝 Get Last 2 Commits
        id: get_commits
        run: |
          COMMITS=$(git log -2 --pretty=format:"- %s")
          echo "Fetched commits:"
          echo "$COMMITS"

          # Safely write multi-line commits to the environment variable
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "COMMITS<<$EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: 🤖 Generate Release Notes via GitHub Models
        id: ai_notes
        env:
          # Use the built-in GITHUB_TOKEN! No external API keys needed.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMITS: ${{ env.COMMITS }}
        run: |
          # Safely construct the JSON payload using jq to prevent formatting/quote errors
          PAYLOAD=$(jq -n --arg prompt "Create a single, cohesive 10 to 12 word description summarizing these git commits for a release note. Do not use markdown, quotes, or conversational filler. Just the summary. Commits: $COMMITS" '{
            model: "openai/gpt-4o",
            messages: [{role: "user", content: $prompt}],
            max_tokens: 30
          }')

          # Call the native GitHub Models endpoint
          RESPONSE=$(curl -s -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            https://models.github.ai/inference/chat/completions \
            -d "$PAYLOAD")
            
          # Extract the text using jq
          NOTES=$(echo $RESPONSE | jq -r '.choices[0].message.content' | tr -d '\n' | tr -d '"')

          # Fallback in case the API call fails or rate-limits
          if [ -z "$NOTES" ] || [ "$NOTES" == "null" ]; then
            echo "AI generation failed, using fallback. Response was: $RESPONSE"
            NOTES="Automated build incorporating the latest bug fixes and feature updates."
          fi

          echo "Generated Notes: $NOTES"
          echo "RELEASE_NOTES=$NOTES" >> $GITHUB_ENV

      - name: 🛠️ Build Android APK (Release)
        run: .github/scripts/build-android.sh
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Package .apk
        run: .github/scripts/package-app-android.sh

      - name: 📤 Upload Android APK to Firebase
        run: .github/scripts/upload-firebase-android.sh
        env:
          ANDROID_APP_ID: ${{ secrets.ANDROID_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RELEASE_NOTES: ${{ env.RELEASE_NOTES }}
