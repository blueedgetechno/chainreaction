name: Build & Distribute iOS to Firebase

on:
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  build:
    name: iOS - ${{ github.ref_name }}
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 4

      - name: Make build scripts executable
        run: |
          chmod +x .github/scripts/build-ios.sh
          chmod +x .github/scripts/package-app-ios.sh
          chmod +x .github/scripts/upload-firebase-ios.sh

      - name: 🧪 Test if secrets are set
        run: |
          if [ -z "${{ secrets.IOS_APP_ID }}" ]; then
            echo "Error: IOS_APP_ID is not set."
            exit 1
          fi
          if [ -z "${{ secrets.FIREBASE_TOKEN }}" ]; then
            echo "Error: FIREBASE_TOKEN is not set."
            exit 1
          fi
          if [ -z "${{ secrets.IOS_CERTIFICATE_BASE64 }}" ]; then
            echo "Error: IOS_CERTIFICATE_BASE64 is not set."
            exit 1
          fi
          if [ -z "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" ]; then
            echo "Error: IOS_CERTIFICATE_PASSWORD is not set."
            exit 1
          fi
          if [ -z "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" ]; then
            echo "Error: IOS_PROVISIONING_PROFILE_BASE64 is not set."
            exit 1
          fi
          if [ -z "${{ secrets.GOOGLE_SERVICES_IOS_BASE64 }}" ]; then
            echo "Error: GOOGLE_SERVICES_IOS_BASE64 is not set."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐕‍🦺 Decode GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_IOS_BASE64 }}" | base64 -d > iosApp/iosApp/GoogleService-Info.plist

      - name: 🔐 Install Apple Certificate & Provisioning Profile
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode files
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate to keychain
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: 📝 Get Last 2 Commits
        id: get_commits
        run: |
          COMMITS=$(git log -2 --pretty=format:"- %s")
          echo "Fetched commits:"
          echo "$COMMITS"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "COMMITS<<$EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: 🤖 Generate Release Notes via GitHub Models
        id: ai_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMITS: ${{ env.COMMITS }}
        run: |
          PAYLOAD=$(jq -n --arg prompt "Create a single, cohesive 10 to 12 word description summarizing these git commits for a release note. Do not use markdown, quotes, or conversational filler. Just the summary. Commits: $COMMITS" '{
            model: "openai/gpt-4o",
            messages: [{role: "user", content: $prompt}],
            max_tokens: 30
          }')

          RESPONSE=$(curl -s -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            https://models.github.ai/inference/chat/completions \
            -d "$PAYLOAD")

          NOTES=$(echo $RESPONSE | jq -r '.choices[0].message.content' | tr -d '\n' | tr -d '"')

          if [ -z "$NOTES" ] || [ "$NOTES" == "null" ]; then
            echo "AI generation failed, using fallback. Response was: $RESPONSE"
            NOTES="Automated build incorporating the latest bug fixes and feature updates."
          fi

          echo "Generated Notes: $NOTES"
          echo "RELEASE_NOTES=$NOTES" >> $GITHUB_ENV

      - name: 🛠️ Build iOS Archive (Release)
        run: .github/scripts/build-ios.sh
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
          DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}

      - name: 📦 Export IPA
        run: .github/scripts/package-app-ios.sh
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}

      - name: 📤 Upload iOS IPA to Firebase
        run: .github/scripts/upload-firebase-ios.sh
        env:
          IOS_APP_ID: ${{ secrets.IOS_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RELEASE_NOTES: ${{ env.RELEASE_NOTES }}

      - name: 🧹 Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
